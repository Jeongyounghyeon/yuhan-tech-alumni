name: Deploy

on:
  push:
    branches:
      - develop
      # - main  # production 배포 준비 시 주석 해제

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.ref_name == 'main' && 'production' || 'develop' }}
    permissions:
      packages: read

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          APP_IMAGE: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          COMPOSE_FILE: ${{ github.ref_name == 'main' && 'docker-compose.prod.yml' || 'docker-compose.dev.yml' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ vars.R2_PUBLIC_URL }}
        with:
          host: ${{ vars.EC2_HOST }}
          username: ${{ vars.EC2_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_ACTOR,APP_IMAGE,COMPOSE_FILE,NEXTAUTH_SECRET,NEXTAUTH_URL,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET_NAME,R2_PUBLIC_URL
          script: |
            set -e
            cd ~/yuhan-tech-alumni

            git pull origin ${{ github.ref_name }}

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

            cat > .env << EOF
            APP_IMAGE=${APP_IMAGE}
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
            NEXTAUTH_URL=${NEXTAUTH_URL}
            R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
            R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
            R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
            R2_BUCKET_NAME=${R2_BUCKET_NAME}
            R2_PUBLIC_URL=${R2_PUBLIC_URL}
            EOF

            docker compose -f ${COMPOSE_FILE} up -d db
            docker compose -f ${COMPOSE_FILE} run --rm migrate
            docker compose -f ${COMPOSE_FILE} pull app
            docker compose -f ${COMPOSE_FILE} up -d --no-deps app
